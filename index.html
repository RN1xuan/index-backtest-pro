<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>指数多模式策略回测系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2563eb; --bg-color: #f3f4f6; --card-bg: #ffffff;
            --text-main: #1f2937; --text-muted: #6b7280; --border-color: #e5e7eb;
            --success-color: #10b981; --danger-color: #ef4444;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 30px; transition: all 0.3s ease; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 16px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); line-height: 1.4; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; }
        .form-group input[type="checkbox"] { width: auto; margin-right: 8px; }
        .checkbox-label { display: flex; align-items: center; font-size: 1rem; font-weight: bold; color: var(--text-main); cursor: pointer; }
        
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 16px; width: 100%; }
        .btn:hover { background-color: #1d4ed8; }
        .btn:disabled { background-color: #93c5fd; cursor: not-allowed; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-box { background: #eff6ff; border-left: 4px solid var(--primary-color); padding: 16px; border-radius: 8px; }
        .stat-box.profit { background: #fdf2f8; border-color: #db2777; }
        .stat-value { font-size: 1.3rem; font-weight: bold; margin-top: 8px; color: var(--primary-color); }
        .stat-box.profit .stat-value { color: #db2777; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f8fafc; font-weight: 600; }
        .text-red { color: var(--danger-color); } .text-green { color: var(--success-color); }
        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 20px; }
        .chart-title { font-size: 1.1rem; font-weight: bold; color: var(--text-main); text-align: center; margin-bottom: 10px; }
        #loading { display: none; color: var(--primary-color); font-weight: bold; text-align: center; margin-top: 10px;}
        
        .mode-desc { font-size: 0.9rem; color: #d97706; background: #fef3c7; padding: 10px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #f59e0b; margin-bottom: 20px;}
        .tp-section { background: #f8fafc; padding: 16px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 10px; }
        .tp-details { opacity: 0.5; pointer-events: none; transition: all 0.3s; }
        .tp-details.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">📈 指数策略回测系统</h1>

    <div class="card">
        <div class="control-grid" style="border-bottom: 1px solid #eee; padding-bottom: 16px;">
            <div class="form-group"><label>1. 上传数据 (.xlsx/.csv)</label><input type="file" id="dataFile" accept=".xlsx, .xls, .csv"></div>
            <div class="form-group">
                <label>2. 交易核心模式</label>
                <select id="tradeMode" onchange="toggleInputs()">
                    <option value="left">📉 左侧抄底 (越跌越买)</option>
                    <option value="right">📈 右侧确认 (先跌后涨买)</option>
                    <option value="dca" selected>⏳ 定期定额 (无脑定投)</option>
                    <option value="swing">🌊 波段区间 (点位触发，低买高抛)</option>
                </select>
            </div>
            <div class="form-group"><label>3. 回测时间范围</label>
                <select id="simYears">
                    <option value="1">近 1 年</option><option value="2">近 2 年</option><option value="3">近 3 年</option>
                    <option value="4">近 4 年</option><option value="5" selected>近 5 年</option><option value="100">全部历史</option>
                </select>
            </div>
        </div>

        <div id="modeDesc" class="mode-desc"><strong>定期定额逻辑：</strong> 无视大盘涨跌，每隔固定交易日自动买入。</div>

        <div class="control-grid" id="leftControls" style="display: none;">
            <div class="form-group"><label>首次建仓跌幅 (%)</label><input type="number" id="l_firstDrop" value="-3.0" step="0.1"></div>
            <div class="form-group"><label>首次买入金额 (元)</label><input type="number" id="l_firstAmt" value="10000" step="1000"></div>
            <div class="form-group"><label>加仓跌幅 (%)</label><input type="number" id="l_subDrop" value="-2.0" step="0.1"></div>
            <div class="form-group"><label>加仓金额 (元)</label><input type="number" id="l_subAmt" value="1000" step="1000"></div>
        </div>
        <div class="control-grid" id="rightControls" style="display: none;">
            <div class="form-group"><label>建仓: 前置跌超(%)</label><input type="number" id="r_firstDrop" value="-3.0" step="0.1"></div>
            <div class="form-group"><label>建仓: 后需涨超(%)</label><input type="number" id="r_firstRise" value="0.5" step="0.1"></div>
            <div class="form-group"><label>首次买入 (元)</label><input type="number" id="r_firstAmt" value="10000" step="1000"></div>
            <div class="form-group"><label>加仓: 前置跌超(%)</label><input type="number" id="r_subDrop" value="-2.0" step="0.1"></div>
            <div class="form-group"><label>加仓: 后需涨超(%)</label><input type="number" id="r_subRise" value="0.5" step="0.1"></div>
            <div class="form-group"><label>加仓买入 (元)</label><input type="number" id="r_subAmt" value="1000" step="1000"></div>
        </div>
        <div class="control-grid" id="dcaControls">
            <div class="form-group"><label>定投周期 (交易日)</label><input type="number" id="dcaInterval" value="20" step="1" min="1"></div>
            <div class="form-group"><label>单期定投金额 (元)</label><input type="number" id="dcaAmount" value="2000" step="500"></div>
        </div>
        <div class="control-grid" id="swingControls" style="display: none;">
            <div class="form-group"><label>最低买入点位</label><input type="number" id="s_buyPoint" value="3500" step="10"></div>
            <div class="form-group"><label>最高卖出点位</label><input type="number" id="s_sellPoint" value="4000" step="10"></div>
            <div class="form-group"><label>首次建仓投入(元)</label><input type="number" id="s_amt" value="10000" step="1000"></div>
        </div>

        <div class="tp-section" id="tpSection">
            <label class="checkbox-label">
                <input type="checkbox" id="tpEnable" onchange="toggleTP()"> 
                🛡️ 开启按比例自动止盈 (当持仓达到目标收益时，自动卖出部分换成现金备用)
            </label>
            <div class="control-grid tp-details" id="tpDetailsPanel" style="margin-top: 12px; margin-bottom: 0;">
                <div class="form-group">
                    <label>触发止盈目标收益率 (%)</label>
                    <input type="number" id="tpThreshold" value="15" step="1" title="例如：当持仓平均收益率达到15%时触发卖出">
                </div>
                <div class="form-group">
                    <label>触发时卖出仓位比例 (%)</label>
                    <input type="number" id="tpRatio" value="50" step="5" max="100" title="例如：50代表卖出一半；100代表全部清仓">
                </div>
            </div>
        </div>

        <button class="btn" id="runBtn" disabled onclick="runSimulation()">🚀 开始回测</button>
        <div id="loading">数据解析中，请稍候...</div>
    </div>

    <div class="stats-grid" id="statsPanel" style="display: none;">
        <div class="stat-box"><div>真金白银投入本金</div><div class="stat-value" id="resInvested">0.00</div></div>
        <div class="stat-box"><div>期末总资产 (持仓+现金池)</div><div class="stat-value" id="resValue">0.00</div></div>
        <div class="stat-box profit"><div>绝对净收益额</div><div class="stat-value" id="resProfit">0.00</div></div>
        <div class="stat-box profit"><div>真实本金收益率</div><div class="stat-value" id="resRate">0.00%</div></div>
        <div class="stat-box"><div>可用空闲现金池</div><div class="stat-value" id="resCash" style="color: #10b981;">0.00</div></div>
    </div>

    <div class="card" id="chartsCard" style="display: none;">
        <div class="chart-title">📊 指数走势与买卖点 (🔴红点买入，🟢绿点止盈)</div>
        <div class="chart-container"><canvas id="indexChart"></canvas></div>
        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
        <div class="chart-title">🆚 策略收益率 vs 指数涨跌幅</div>
        <div class="chart-container"><canvas id="compareChart"></canvas></div>
        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">
        <div class="chart-title">💰 总资产曲线 vs 真金白银投入本金</div>
        <div class="chart-container"><canvas id="valueChart"></canvas></div>
    </div>

    <div class="card" id="historyCard" style="display: none;">
        <h3>🧾 操作记录明细 (倒序排列)</h3>
        <div style="max-height: 400px; overflow-y: auto;">
            <table id="historyTable">
                <thead><tr><th>日期</th><th>指数点位</th><th>操作详情</th><th>交易金额 (元)</th><th>现金池余额</th><th>真实本金总投入</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let globalData = [];
    let compareChartInst = null; let valueChartInst = null; let indexChartInst = null;
    let indexNameFromData = "宽基指数"; 

    function toggleTP() {
        const isEnabled = document.getElementById('tpEnable').checked;
        const panel = document.getElementById('tpDetailsPanel');
        if(isEnabled) panel.classList.add('active'); else panel.classList.remove('active');
    }

    function toggleInputs() {
        const mode = document.getElementById('tradeMode').value;
        document.getElementById('leftControls').style.display = mode === 'left' ? 'grid' : 'none';
        document.getElementById('rightControls').style.display = mode === 'right' ? 'grid' : 'none';
        document.getElementById('swingControls').style.display = mode === 'swing' ? 'grid' : 'none';
        document.getElementById('dcaControls').style.display = mode === 'dca' ? 'grid' : 'none';
        
        // 如果是波段模式，隐藏自定义止盈（因为它自带清仓）
        document.getElementById('tpSection').style.display = mode === 'swing' ? 'none' : 'block';

        const descEl = document.getElementById('modeDesc');
        if (mode === 'left') descEl.innerHTML = "<strong>左侧抄底逻辑：</strong> 只要单日跌破阈值，立刻执行买入（越跌越买）。";
        else if (mode === 'right') descEl.innerHTML = "<strong>右侧确认逻辑：</strong> 先跌破阈值进入准备状态；之后某日强势反弹涨破阈值，确认底部反转买入。";
        else if (mode === 'swing') descEl.innerHTML = "<strong>波段区间逻辑：</strong> 跌破设定的低点买入，突破设定的高点清仓。全仓进出，不参与自定义比例止盈。";
        else descEl.innerHTML = "<strong>定期定额逻辑：</strong> 无视大盘涨跌，每隔固定交易日自动买入。";
    }

    document.getElementById('dataFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('runBtn').disabled = true;

        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
            parseData(json);
        };
        reader.readAsArrayBuffer(file);
    });

    function parseData(json) {
        globalData = [];
        if (json.length > 0) {
            let firstRow = json[0];
            indexNameFromData = firstRow['指数中文简称Index Chinese Name'] || firstRow['指数中文简称'] || firstRow['指数名称'] || "宽基指数";
            document.getElementById('mainTitle').innerText = `📈 ${indexNameFromData} 回测系统 (含滚动止盈)`;
        }
        json.forEach(row => {
            let dateStr = String(row['日期Date'] || row['日期'] || row['Date'] || '');
            let close = parseFloat(row['收盘Close'] || row['收盘价'] || row['Close']);
            let change = parseFloat(row['涨跌幅(%)Change(%)'] || row['涨跌幅'] || row['Change']);
            if (dateStr && !isNaN(close) && !isNaN(change)) {
                if(dateStr.length === 8 && !dateStr.includes('-')){ dateStr = `${dateStr.substring(0,4)}-${dateStr.substring(4,6)}-${dateStr.substring(6,8)}`; }
                globalData.push({ dateObj: new Date(dateStr), dateStr: dateStr, close: close, change: change });
            }
        });
        globalData.sort((a, b) => a.dateObj - b.dateObj);
        document.getElementById('loading').style.display = 'none';
        if (globalData.length > 0) {
            document.getElementById('runBtn').disabled = false;
            let prices = globalData.map(d => d.close);
            let avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;
            document.getElementById('s_buyPoint').value = Math.floor(avgPrice * 0.85); 
            document.getElementById('s_sellPoint').value = Math.floor(avgPrice * 1.15); 
            alert(`✅ 数据加载成功！`);
        }
    }

    function runSimulation() {
        if (globalData.length === 0) return;

        const mode = document.getElementById('tradeMode').value;
        const years = parseInt(document.getElementById('simYears').value);
        
        // 止盈参数
        const tpEnable = document.getElementById('tpEnable').checked && mode !== 'swing';
        const tpThresh = parseFloat(document.getElementById('tpThreshold').value);
        const tpRatio = parseFloat(document.getElementById('tpRatio').value);

        const maxDate = globalData[globalData.length - 1].dateObj;
        const startDate = new Date(maxDate);
        startDate.setFullYear(maxDate.getFullYear() - years);
        const simData = globalData.filter(d => d.dateObj >= startDate);

        // 核心财务指标
        let cumulativePrincipal = 0; // 真实外场充值的本金
        let positionCost = 0;        // 当前持仓的成本核算（用于触发止盈）
        let totalShares = 0;         // 持仓份额
        let accountCash = 0;         // 闲置现金池 (止盈资金存放处)
        
        let buyTimes = 0; let hasBoughtFirst = false; let tradeHistory = [];
        let r_firstDropMet = false; let r_subDropMet = false;   

        // 获取参数
        let p = {};
        if(mode === 'left') {
            p.fDrop = parseFloat(document.getElementById('l_firstDrop').value); p.fAmt = parseFloat(document.getElementById('l_firstAmt').value);
            p.sDrop = parseFloat(document.getElementById('l_subDrop').value); p.sAmt = parseFloat(document.getElementById('l_subAmt').value);
        } else if (mode === 'right') {
            p.fDrop = parseFloat(document.getElementById('r_firstDrop').value); p.fRise = parseFloat(document.getElementById('r_firstRise').value); p.fAmt = parseFloat(document.getElementById('r_firstAmt').value);
            p.sDrop = parseFloat(document.getElementById('r_subDrop').value); p.sRise = parseFloat(document.getElementById('r_subRise').value); p.sAmt = parseFloat(document.getElementById('r_subAmt').value);
        } else if (mode === 'swing') {
            p.lowPoint = parseFloat(document.getElementById('s_buyPoint').value); p.highPoint = parseFloat(document.getElementById('s_sellPoint').value); p.amt = parseFloat(document.getElementById('s_amt').value);
        } else {
            p.interval = parseInt(document.getElementById('dcaInterval').value); p.dcaAmt = parseFloat(document.getElementById('dcaAmount').value);
        }

        let labels = [], valueData = [], costData = [], indexPointsData = [];
        let buyPointRadiuses = [], buyPointColors = [];
        let strategyReturnData = [], indexReturnData = [];
        let baseIndexClose = simData.length > 0 ? simData[0].close : 1;

        simData.forEach((day, index) => {
            let actionName = ""; let isBuyDay = false; let isSellDay = false;
            let transactAmount = 0;  // 交易的资产额度
            let injectPrincipal = 0; // 从外部投入的新钱

            // ============================
            // 第一步：检查是否触发主动止盈 (非波段模式)
            // ============================
            if (tpEnable && totalShares > 0) {
                let avgCost = positionCost / totalShares;
                // 如果当前价格涨超成本目标
                if (day.close >= avgCost * (1 + tpThresh / 100)) {
                    let sellShares = totalShares * (tpRatio / 100);
                    transactAmount = sellShares * day.close;
                    accountCash += transactAmount; // 钱流入现金池
                    totalShares -= sellShares;
                    
                    // 重置剩余持仓的成本线到当前最新价，防止第二天无限连环卖出
                    positionCost = totalShares * day.close; 
                    
                    actionName = `🟢 达到目标, 止盈${tpRatio}%`;
                    isSellDay = true;
                    buyTimes++;
                    tradeHistory.push({ date: day.dateStr, close: day.close.toFixed(2), action: actionName, amount: transactAmount, cash: accountCash, totalInvest: cumulativePrincipal });
                }
            }

            // ============================
            // 第二步：检查买入/波段策略
            // ============================
            let signalBuyAmt = 0;
            
            if (mode === 'swing') {
                if (totalShares === 0 && day.close <= p.lowPoint) { signalBuyAmt = accountCash > 0 ? accountCash : p.amt; actionName = "🔴 跌破低点全仓买入"; } 
                else if (totalShares > 0 && day.close >= p.highPoint) {
                    transactAmount = totalShares * day.close; accountCash += transactAmount; totalShares = 0; positionCost = 0;
                    actionName = "🟢 突破高点全部清仓"; isSellDay = true;
                }
            } 
            else {
                if (mode === 'dca' && index % p.interval === 0) { signalBuyAmt = p.dcaAmt; actionName = "🔴 定投买入"; }
                else if (mode === 'left') {
                    if (!hasBoughtFirst && day.change <= p.fDrop) { signalBuyAmt = p.fAmt; actionName = "🔴 左侧建仓"; hasBoughtFirst = true; }
                    else if (hasBoughtFirst && day.change <= p.sDrop) { signalBuyAmt = p.sAmt; actionName = "🔴 左侧加仓"; }
                }
                else if (mode === 'right') {
                    if (!hasBoughtFirst) {
                        if (!r_firstDropMet && day.change <= p.fDrop) r_firstDropMet = true;
                        else if (r_firstDropMet && day.change >= p.fRise) { signalBuyAmt = p.fAmt; actionName = "🔴 右侧建仓"; hasBoughtFirst = true; r_firstDropMet = false; }
                    } else {
                        if (!r_subDropMet && day.change <= p.sDrop) r_subDropMet = true;
                        else if (r_subDropMet && day.change >= p.sRise) { signalBuyAmt = p.sAmt; actionName = "🔴 右侧加仓"; r_subDropMet = false; }
                    }
                }
            }

            // 执行买入 (优先扣除闲置现金，不够的再投新钱)
            if (signalBuyAmt > 0) {
                let amountFromCash = Math.min(accountCash, signalBuyAmt);
                injectPrincipal = signalBuyAmt - amountFromCash;
                
                accountCash -= amountFromCash;
                cumulativePrincipal += injectPrincipal; // 只有从外部拿钱，真金白银投入才增加
                positionCost += signalBuyAmt;
                totalShares += signalBuyAmt / day.close;
                
                isBuyDay = true; buyTimes++;
                tradeHistory.push({ date: day.dateStr, close: day.close.toFixed(2), action: actionName, amount: signalBuyAmt, cash: accountCash, totalInvest: cumulativePrincipal });
            } else if (isSellDay && mode === 'swing') {
                buyTimes++;
                tradeHistory.push({ date: day.dateStr, close: day.close.toFixed(2), action: actionName, amount: transactAmount, cash: accountCash, totalInvest: cumulativePrincipal });
            }

            // ============================
            // 每日盘后结算数据记录
            // ============================
            labels.push(day.dateStr);
            indexPointsData.push(day.close.toFixed(2));

            let currentAssetValue = (totalShares * day.close) + accountCash; 
            let currentPnl = currentAssetValue - cumulativePrincipal; 
            
            valueData.push(currentAssetValue.toFixed(2)); 
            costData.push(cumulativePrincipal.toFixed(2)); // 这里现在画的是【真金白银投入】
            
            // 绘制红绿点
            if (isSellDay) { buyPointRadiuses.push(7); buyPointColors.push('#10b981'); } // 绿点优先级高
            else if (isBuyDay) { buyPointRadiuses.push(5); buyPointColors.push('#ef4444'); } // 红点
            else { buyPointRadiuses.push(0); buyPointColors.push('transparent'); }

            let indexReturn = ((day.close - baseIndexClose) / baseIndexClose) * 100;
            let strategyReturn = cumulativePrincipal > 0 ? (currentPnl / cumulativePrincipal) * 100 : 0;
            indexReturnData.push(indexReturn.toFixed(2)); strategyReturnData.push(strategyReturn.toFixed(2));
        });

        const finalValue = (totalShares * simData[simData.length - 1].close) + accountCash;
        const profit = finalValue - cumulativePrincipal;
        const returnRate = cumulativePrincipal > 0 ? (profit / cumulativePrincipal) * 100 : 0;

        renderUI(cumulativePrincipal, finalValue, profit, returnRate, accountCash, buyTimes, tradeHistory);
        renderCharts(labels, indexPointsData, buyPointRadiuses, buyPointColors, strategyReturnData, indexReturnData, valueData, costData);
    }

    function renderUI(invested, value, profit, rate, cash, times, history) {
        document.getElementById('statsPanel').style.display = 'grid';
        document.getElementById('chartsCard').style.display = 'block';
        document.getElementById('historyCard').style.display = 'block';

        document.getElementById('resInvested').innerText = `¥${invested.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
        document.getElementById('resValue').innerText = `¥${value.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
        document.getElementById('resCash').innerText = `¥${cash.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
        const profitEl = document.getElementById('resProfit'); const rateEl = document.getElementById('resRate');
        profitEl.innerText = `${profit >= 0 ? '+' : ''}¥${profit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
        rateEl.innerText = `${rate >= 0 ? '+' : ''}${rate.toFixed(2)}%`;
        profitEl.style.color = profit >= 0 ? '#db2777' : '#16a34a'; rateEl.style.color = rate >= 0 ? '#db2777' : '#16a34a';

        const tbody = document.querySelector('#historyTable tbody');
        tbody.innerHTML = '';
        history.reverse().forEach(record => {
            const tr = document.createElement('tr');
            const actionColor = record.action.includes('🟢') ? 'color:#10b981;' : 'color:#ef4444;';
            tr.innerHTML = `<td>${record.date}</td><td>${record.close}</td><td><strong style="${actionColor}">${record.action}</strong></td><td>¥${record.amount.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td><td style="color:#6b7280;">¥${record.cash.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td><td>¥${record.totalInvest.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>`;
            tbody.appendChild(tr);
        });
    }

    function renderCharts(labels, indexPointsData, radiuses, pointColors, stratReturn, idxReturn, valData, costData) {
        if(indexChartInst) indexChartInst.destroy();
        indexChartInst = new Chart(document.getElementById('indexChart').getContext('2d'), {
            type: 'line', data: { labels: labels, datasets: [{ label: `${indexNameFromData} 收盘点位`, data: indexPointsData, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.1)', borderWidth: 2, fill: true, pointRadius: radiuses, pointBackgroundColor: pointColors, pointBorderColor: pointColors, pointHoverRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false } }
        });

        if(compareChartInst) compareChartInst.destroy();
        compareChartInst = new Chart(document.getElementById('compareChart').getContext('2d'), {
            type: 'line', data: { labels: labels, datasets: [ 
                { label: '真实本金收益率 (%)', data: stratReturn, borderColor: '#db2777', borderWidth: 2, pointRadius: radiuses, pointBackgroundColor: pointColors, pointBorderColor: pointColors, pointHoverRadius: 8 }, 
                { label: `${indexNameFromData}涨跌幅 (%)`, data: idxReturn, borderColor: '#6b7280', borderDash: [5, 5], borderWidth: 2, pointRadius: 0 } 
            ] },
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + '%' } } } }
        });

        if(valueChartInst) valueChartInst.destroy();
        valueChartInst = new Chart(document.getElementById('valueChart').getContext('2d'), {
            type: 'line', data: { labels: labels, datasets: [ 
                { label: '总资产(持仓+现金)', data: valData, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, pointRadius: radiuses, pointBackgroundColor: pointColors, pointBorderColor: pointColors, pointHoverRadius: 8 }, 
                { label: '真金白银投入 (元)', data: costData, borderColor: '#2563eb', borderDash: [5,5], pointRadius: 0 } 
            ] },
            options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false } }
        });
    }
</script>
</body>
</html>
